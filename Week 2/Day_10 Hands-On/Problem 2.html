<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Landing Page</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bs-primary: #6f42c1;
        }
        .hero {
            background: linear-gradient(135deg, #6f42c1, #9b59b6);
            color: white;
            padding: 100px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">ShopNow</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="offcanvasMenu">
    <div class="offcanvas-header">
        <h5>Menu</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
    </div>
</div>

<section class="hero mt-5">
    <div class="container">
        <h1>Welcome to ShopNow</h1>
        <p>Best deals for best products</p>
        <button class="btn btn-light btn-lg">Shop Now</button>
    </div>
</section>

<div id="productCarousel" class="carousel slide container my-5" data-bs-ride="carousel">


    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

<div class="container my-5">
    <div class="row g-4">

        <div class="col-12 col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Product 1</h5>
                    <p>$99</p>
                    <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Product 2</h5>
                    <p>$149</p>
                    <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5>Product 3</h5>
                    <p>$199</p>
                    <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="bg-light py-5">
    <div class="container text-center">
        <h4>Subscribe to our Newsletter</h4>
        <form class="row justify-content-center">
            <div class="col-md-6">
                <input type="email" class="form-control mb-3" placeholder="Enter your email">
                <button class="btn btn-primary w-100">Subscribe</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
