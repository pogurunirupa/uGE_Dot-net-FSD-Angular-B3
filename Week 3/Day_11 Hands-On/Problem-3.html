<!DOCTYPE html>
<html>
<head>
    <title>Product Cart</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .product { margin-bottom: 15px; }
        .added { color: green; margin-left:10px; }
    </style>
</head>
<body>

<h2>Shopping Cart</h2>
Cart Items: <span id="cartCount">0</span>
<hr>

<div class="product">
    <p>Product 1</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 2</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 3</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<div class="product">
    <p>Product 4</p>
    <button class="addBtn">Add to Cart</button>
    <span class="msg"></span>
</div>

<script>
$(document).ready(function(){

    let count = 0;

    $(".addBtn").click(function(){

        count++;
        $("#cartCount").text(count);

        $(this).prop("disabled", true);

        $(this).next(".msg")
               .text("Added to cart!")
               .addClass("added");

    });

});
</script>

</body>
</html>
